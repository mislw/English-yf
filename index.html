<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语语法 — 从零开始</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --color-bg: #fafaf9;
  --color-surface: #ffffff;
  --color-border: #e7e5e4;
  --color-text: #1c1917;
  --color-text-secondary: #57534e;
  --color-text-muted: #a8a29e;
  --color-accent: #2563eb;
  --color-accent-light: #dbeafe;
  --color-success: #16a34a;
  --color-success-light: #dcfce7;
  --color-error: #dc2626;
  --color-error-light: #fef2f2;
  --color-warning: #f59e0b;
  --color-warning-light: #fffbeb;
  --color-a1: #16a34a;
  --color-a2: #2563eb;
  --color-b1: #9333ea;
  --sidebar-width: 260px;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.04);
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
  --transition: 150ms ease;
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== Layout ===== */
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 10;
  overflow-y: auto;
}
.sidebar-header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--color-border);
}
.sidebar-header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.sidebar-header .subtitle {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  margin-top: 2px;
}
.sidebar-stats {
  display: flex;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--color-border);
}
.stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
}
.stat-value { font-size: 1.25rem; font-weight: 700; color: var(--color-accent); }
.stat-label { font-size: 0.7rem; color: var(--color-text-muted); }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.nav-group-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-text-muted);
  padding: 12px 20px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  transition: background var(--transition);
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-size: 0.875rem;
  color: var(--color-text);
  font-family: var(--font-sans);
  position: relative;
}
.nav-item:hover { background: #f5f5f4; }
.nav-item.active { background: var(--color-accent-light); color: var(--color-accent); font-weight: 600; }
.nav-item .level-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 999px;
  color: white;
  flex-shrink: 0;
}
.level-badge.a1 { background: var(--color-a1); }
.level-badge.a2 { background: var(--color-a2); }
.level-badge.b1 { background: var(--color-b1); }
.nav-item .check-icon {
  margin-left: auto;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem;
  flex-shrink: 0;
}
.check-icon.done { background: var(--color-success); color: white; }
.check-icon.undone { border: 1.5px solid var(--color-border); color: transparent; }
.nav-item .lesson-num {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  background: #f5f5f4;
  color: var(--color-text-secondary);
  flex-shrink: 0;
}
.nav-item.active .lesson-num { background: var(--color-accent); color: white; }

/* Main */
.main {
  margin-left: var(--sidebar-width);
  flex: 1;
  padding: 32px 40px;
  max-width: 800px;
}
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--color-surface);
  border-top: 1px solid var(--color-border);
  z-index: 10;
  padding: 6px 0 env(safe-area-inset-bottom, 6px);
}
.mobile-nav-inner {
  display: flex;
  justify-content: space-around;
}
.mobile-nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 12px;
  border: none;
  background: none;
  color: var(--color-text-muted);
  font-size: 0.65rem;
  cursor: pointer;
  font-family: var(--font-sans);
}
.mobile-nav-btn.active { color: var(--color-accent); }
.mobile-nav-btn svg { width: 20px; height: 20px; }

/* Lesson Content */
.lesson-header {
  margin-bottom: 28px;
}
.lesson-header .level-tag {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 999px;
  color: white;
  margin-bottom: 8px;
}
.level-tag.A1 { background: var(--color-a1); }
.level-tag.A2 { background: var(--color-a2); }
.level-tag.B1 { background: var(--color-b1); }
.lesson-header h2 {
  font-size: 1.75rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.25;
}
.lesson-header .en-title {
  font-size: 0.9rem;
  color: var(--color-text-muted);
  margin-top: 4px;
}

/* Explanation Section */
.explanation-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-sm);
}
.explanation-card h3 {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-text-muted);
  margin-bottom: 16px;
}
.explanation-card .summary {
  font-size: 0.95rem;
  color: var(--color-text-secondary);
  margin-bottom: 18px;
  line-height: 1.7;
}
.point-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.point-list li {
  padding: 12px 16px;
  background: #fafaf9;
  border-left: 3px solid var(--color-accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 0.9rem;
  line-height: 1.6;
}
.point-list li strong { color: var(--color-accent); }
.example-block {
  margin-top: 18px;
  padding: 14px 16px;
  background: var(--color-accent-light);
  border-radius: var(--radius-sm);
}
.example-block .example-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-accent);
  margin-bottom: 8px;
}
.example-block p {
  font-size: 0.9rem;
  color: var(--color-text);
  margin-bottom: 4px;
}
.example-block p .en { color: var(--color-accent); font-weight: 500; }

/* Quiz Section */
.quiz-section { margin-top: 8px; }
.quiz-progress-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
}
.quiz-dot {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--color-border);
  transition: background var(--transition);
}
.quiz-dot.answered { background: var(--color-accent); }
.quiz-dot.correct { background: var(--color-success); }
.quiz-dot.wrong { background: var(--color-error); }
.quiz-dot.current { background: var(--color-text-secondary); }

.question-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.question-card .q-num {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.question-card .q-text {
  font-size: 1.05rem;
  font-weight: 500;
  margin-bottom: 18px;
  line-height: 1.6;
}
.question-card .q-text .blank {
  display: inline-block;
  min-width: 80px;
  border-bottom: 2px dashed var(--color-accent);
  color: var(--color-accent);
  padding: 0 4px;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.option-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--color-surface);
  cursor: pointer;
  font-size: 0.9rem;
  font-family: var(--font-sans);
  transition: all var(--transition);
  text-align: left;
}
.option-btn:hover { border-color: var(--color-accent); background: #fafaff; }
.option-btn.selected { border-color: var(--color-accent); background: var(--color-accent-light); }
.option-btn.correct-choice { border-color: var(--color-success); background: var(--color-success-light); }
.option-btn.wrong-choice { border-color: var(--color-error); background: var(--color-error-light); }
.option-btn:disabled { cursor: default; }
.option-letter {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: #f5f5f4;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--color-text-secondary);
  flex-shrink: 0;
}
.option-btn.correct-choice .option-letter { background: var(--color-success); color: white; }
.option-btn.wrong-choice .option-letter { background: var(--color-error); color: white; }

/* Fill Input */
.fill-input-wrap {
  display: flex;
  gap: 8px;
  align-items: center;
}
.fill-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-family: var(--font-sans);
  transition: border-color var(--transition);
  outline: none;
}
.fill-input:focus { border-color: var(--color-accent); }
.fill-input.correct-fill { border-color: var(--color-success); background: var(--color-success-light); }
.fill-input.wrong-fill { border-color: var(--color-error); background: var(--color-error-light); }
.fill-input:disabled { background: #fafaf9; }
.submit-btn {
  padding: 10px 20px;
  background: var(--color-accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: opacity var(--transition);
  white-space: nowrap;
}
.submit-btn:hover { opacity: 0.9; }
.submit-btn:disabled { opacity: 0.4; cursor: default; }

/* Feedback */
.feedback {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  display: none;
  animation: fadeIn 0.2s ease;
}
.feedback.show { display: block; }
.feedback.correct { background: var(--color-success-light); color: #15803d; }
.feedback.wrong { background: var(--color-error-light); color: #b91c1c; }

/* Result Panel */
.result-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  box-shadow: var(--shadow-md);
  animation: fadeIn 0.3s ease;
}
.result-panel .big-score {
  font-size: 4rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
}
.big-score.perfect { color: var(--color-success); }
.big-score.good { color: var(--color-accent); }
.big-score.ok { color: var(--color-warning); }
.big-score.low { color: var(--color-error); }
.result-panel .score-label {
  font-size: 0.9rem;
  color: var(--color-text-muted);
  margin: 8px 0 20px;
}
.result-panel .result-msg {
  font-size: 1rem;
  font-weight: 500;
  margin-bottom: 20px;
}
.retry-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 24px;
  background: var(--color-accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: opacity var(--transition);
}
.retry-btn:hover { opacity: 0.9; }

/* Welcome / Empty State */
.welcome {
  text-align: center;
  padding: 60px 20px;
}
.welcome h2 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }
.welcome p { color: var(--color-text-secondary); margin-top: 8px; max-width: 400px; margin-inline: auto; }
.welcome .start-hint {
  margin-top: 24px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 28px;
  background: var(--color-accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
}

/* Mobile */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 20px 16px 100px; max-width: 100%; }
  .mobile-nav { display: block; }
  .lesson-header h2 { font-size: 1.4rem; }
  .explanation-card { padding: 18px; }
  .question-card { padding: 18px; }
  .result-panel { padding: 24px; }
}
/* Desktop sidebar toggle */
@media (min-width: 769px) {
  .mobile-nav { display: none; }
}

/* Sync */
.sync-section { padding: 12px 20px; border-top: 1px solid var(--color-border); }
.sync-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 8px 0;
  border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  background: var(--color-surface); color: var(--color-text-secondary);
  font-size: 0.78rem; font-family: var(--font-sans); cursor: pointer;
  transition: all var(--transition); margin-bottom: 6px;
}
.sync-btn:hover { border-color: var(--color-accent); color: var(--color-accent); background: #fafaff; }
.sync-btn.copied { border-color: var(--color-success); color: var(--color-success); background: var(--color-success-light); }
.import-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--color-text); color: white; padding: 10px 20px;
  border-radius: 999px; font-size: 0.85rem; font-family: var(--font-sans);
  z-index: 100; animation: fadeIn 0.25s ease;
  pointer-events: none;
}
.import-toast.success { background: var(--color-success); }
.import-toast.error { background: var(--color-error); }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>📖 英语语法</h1>
      <div class="subtitle">从零开始 · 体系化学习</div>
    </div>
    <div class="sidebar-stats">
      <div class="stat-item">
        <span class="stat-value" id="statCompleted">0</span>
        <span class="stat-label">已完成</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statAvg">-</span>
        <span class="stat-label">平均分</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statBest">-</span>
        <span class="stat-label">最高分</span>
      </div>
    </div>
    <div class="sync-section">
      <button class="sync-btn" onclick="exportProgress()" title="复制进度数据，粘贴到另一台设备">📤 导出进度</button>
      <button class="sync-btn" onclick="importProgress()" title="从另一台设备粘贴进度数据">📥 导入进度</button>
    </div>
    <nav class="sidebar-nav" id="lessonNav"></nav>
  </aside>

  <!-- Main Content -->
  <main class="main" id="mainContent"></main>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <button class="mobile-nav-btn active" onclick="switchMobileTab(0)" id="mobTab0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        学习
      </button>
      <button class="mobile-nav-btn" onclick="switchMobileTab(1)" id="mobTab1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        进度
      </button>
    </div>
  </nav>
</div>

<script>
// ===== DATA =====
const LESSONS = [
  {
    id: 1, title: '名词与冠词', enTitle: 'Nouns & Articles', level: 'A1',
    summary: '名词表示人、事物、地点或抽象概念。英语中名词前常需要加冠词 a、an 或 the，中文里没有这个习惯，所以需要特别注意。',
    points: [
      '<strong>可数名词</strong>有单复数：apple → apples，box → boxes',
      '<strong>不可数名词</strong>没有复数：water, rice, information',
      '<strong>a/an</strong> 用于泛指的单数可数名词前：a cat, an apple（an 用于元音音素开头的词前）',
      '<strong>the</strong> 用于特指，双方都知道的东西：the sun, the book on the table',
      '复数名词和不可数名词泛指时<strong>不加冠词</strong>：I like music. Cats are cute.',
    ],
    examples: [
      'I saw <span class="en">a dog</span> in the park. 我在公园看到一只狗。',
      'She ate <span class="en">an orange</span>. 她吃了一个橙子。',
      '<span class="en">The dog</span> is very friendly. 那只狗很友好。',
      '<span class="en">Water</span> is important. 水很重要。',
    ],
    questions: [
      { type: 'choice', q: 'I need ___ umbrella. It\'s raining.', options: ['a', 'an', 'the', '(不加冠词)'], answer: 1 },
      { type: 'choice', q: '___ sun rises in the east.', options: ['A', 'An', 'The', '(不加冠词)'], answer: 2 },
      { type: 'fill', q: 'She has two ___ (cat).', answer: 'cats' },
      { type: 'choice', q: '___ milk is good for health.', options: ['A', 'An', 'The', '(不加冠词)'], answer: 3 },
      { type: 'fill', q: 'I bought ___ book yesterday. (一本)', answer: 'a' },
    ],
  },
  {
    id: 2, title: '人称代词', enTitle: 'Personal Pronouns', level: 'A1',
    summary: '人称代词代替人或事物的名称。分为主格（做主语）和宾格（做宾语），还有形容词性物主代词（表示"谁的"）。',
    points: [
      '<strong>主格</strong>（主语位置）：I, you, he, she, it, we, they',
      '<strong>宾格</strong>（宾语位置）：me, you, him, her, it, us, them',
      '<strong>物主代词</strong>（表示所属）：my, your, his, her, its, our, their',
      'he/him/his 指男性，she/her/her 指女性，<strong>it/its</strong> 指事物或动物',
      '英语中<strong>必须有主语</strong>，不像中文可以省略："下雨了" → "It is raining."',
    ],
    examples: [
      '<span class="en">He</span> is a teacher. 他是老师。（he 是主语）',
      'I like <span class="en">her</span>. 我喜欢她。（her 是宾语）',
      'This is <span class="en">my</span> book. 这是我的书。（my 表示所属）',
      '<span class="en">It</span> is cold today. 今天很冷。（it 做形式主语）',
    ],
    questions: [
      { type: 'choice', q: '___ is my best friend.', options: ['Her', 'She', 'Hers', 'Herself'], answer: 1 },
      { type: 'fill', q: 'Please give ___ the book. (我，宾格)', answer: 'me' },
      { type: 'choice', q: 'This is not your pen. It\'s ___ .', options: ['I', 'me', 'my', 'mine'], answer: 3 },
      { type: 'fill', q: '___ are students. (我们)', answer: 'We' },
      { type: 'choice', q: 'Look at that dog! ___ tail is very long.', options: ['It', 'Its', 'It\'s', 'His'], answer: 1 },
    ],
  },
  {
    id: 3, title: 'Be 动词', enTitle: 'Verb "to be"', level: 'A1',

      { type: 'fill', q: 'The decision ___ (make) yesterday. (被动)', answer: 'was made' },
      { type: 'choice', q: 'I have lived here ___ 2015.', options: ['in', 'for', 'since', 'at'], answer: 2 },
      { type: 'fill', q: 'She is the one ___ helped me. (定语从句引导词)', answer: 'who' },
      { type: 'choice', q: 'By the time we arrived, the movie ___.', options: ['already started', 'had already started', 'has already started', 'starts'], answer: 1 },
    ],
  },
];

// ===== STATE =====
const STORAGE_KEY = 'grammar_learning_progress';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

let progress = loadProgress();
let currentLessonId = null;
let currentQuestionIndex = 0;
let currentAnswers = []; // { answer, correct } per question

// ===== HELPERS =====
function getLessonProgress(id) {
  return progress[id] || { completed: false, score: 0, bestScore: 0 };
}

function updateLessonProgress(id, score) {
  const prev = getLessonProgress(id);
  progress[id] = {
    completed: true,
    score: score,
    bestScore: Math.max(prev.bestScore, score),
    lastAttempt: new Date().toISOString().split('T')[0],
  };
  saveProgress(progress);
  updateSidebar();
}

function getCompletedCount() {
  return LESSONS.filter(l => getLessonProgress(l.id).completed).length;
}

function getAverageScore() {
  const completed = LESSONS.filter(l => getLessonProgress(l.id).completed);
  if (completed.length === 0) return null;
  const sum = completed.reduce((s, l) => s + getLessonProgress(l.id).bestScore, 0);
  return Math.round(sum / completed.length);
}

function getBestSingleScore() {
  const scores = LESSONS.map(l => getLessonProgress(l.id).bestScore).filter(s => s > 0);
  return scores.length > 0 ? Math.max(...scores) : null;
}

// ===== RENDER SIDEBAR =====
function buildNavItem(l, i) {
  const p = getLessonProgress(l.id);
  const active = currentLessonId === l.id ? ' active' : '';
  const checkClass = p.completed ? 'done' : 'undone';
  const checkContent = p.completed ? '✓' : '';
  const levelClass = l.level.toLowerCase();
  return `
    <button class="nav-item${active}" onclick="openLesson(${l.id})" data-lesson="${l.id}">
      <span class="lesson-num">${i + 1}</span>
      <span>${l.title}</span>
      <span class="level-badge ${levelClass}">${l.level}</span>
      <span class="check-icon ${checkClass}">${checkContent}</span>
    </button>
  `;
}

function updateSidebar() {
  const nav = document.getElementById('lessonNav');
  const groups = { A1: [], A2: [], B1: [] };
  LESSONS.forEach((l, i) => {
    const group = ['A1','A2','B1'].includes(l.level) ? l.level : 'A2';
    groups[group].push({ lesson: l, index: i });
  });

  let html = '';
  for (const [group, items] of Object.entries(groups)) {
    if (items.length === 0) continue;
    const labels = { A1: '基础', A2: '进阶', B1: '中级' };
    html += `<div class="nav-group-label">${labels[group]} · ${group}</div>`;
    items.forEach(item => { html += buildNavItem(item.lesson, item.index); });
  }
  nav.innerHTML = html;

  // Stats
  document.getElementById('statCompleted').textContent = `${getCompletedCount()}/${LESSONS.length}`;
  const avg = getAverageScore();
  document.getElementById('statAvg').textContent = avg !== null ? `${avg}/5` : '-';
  const best = getBestSingleScore();
  document.getElementById('statBest').textContent = best !== null ? `${best}/5` : '-';

  // Mobile tab
  updateMobileNavActive();
}

// ===== RENDER LESSON =====
function openLesson(id) {
  currentLessonId = id;
  currentQuestionIndex = 0;
  currentAnswers = [];
  updateSidebar();
  renderLesson();
  document.getElementById('mainContent').scrollTop = 0;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderLesson() {
  const lesson = LESSONS.find(l => l.id === currentLessonId);
  if (!lesson) { renderWelcome(); return; }

  const p = getLessonProgress(lesson.id);
  const levelClass = lesson.level;

  let html = '';
  // Header
  html += `<div class="lesson-header">`;
  html += `<span class="level-tag ${levelClass}">${lesson.level}</span>`;
  html += `<h2>${lesson.title}</h2>`;
  html += `<div class="en-title">${lesson.enTitle}</div>`;
  html += `</div>`;

  // Explanation
  html += `<div class="explanation-card">`;
  html += `<h3>📚 知识点</h3>`;
  html += `<p class="summary">${lesson.summary}</p>`;
  html += `<ul class="point-list">`;
  lesson.points.forEach(p => { html += `<li>${p}</li>`; });
  html += `</ul>`;
  html += `<div class="example-block">`;
  html += `<div class="example-label">例句</div>`;
  lesson.examples.forEach(e => { html += `<p>${e}</p>`; });
  html += `</div>`;
  html += `</div>`;

  // Quiz
  if (currentQuestionIndex >= lesson.questions.length) {
    // Show result
    const totalCorrect = currentAnswers.filter(a => a.correct).length;
    const total = lesson.questions.length;
    let scoreClass = 'low';
    if (totalCorrect === total) scoreClass = 'perfect';
    else if (totalCorrect >= total * 0.8) scoreClass = 'good';
    else if (totalCorrect >= total * 0.6) scoreClass = 'ok';

    const msgs = {
      5: '🏆 满分！太棒了！你对这个语法点掌握得非常好。',
      4: '👍 很好！只错了一个，再复习一下错题就更完美了。',
      3: '📖 不错，但还有提升空间。建议重新看看知识点再试一次。',
      2: '📝 还需要多练习。仔细读一遍知识点，然后重做。',
      1: '💪 别灰心！基础需要加固，认真复习后再来挑战。',
      0: '🌱 万事开头难！回到知识点部分仔细学习，然后再试。',
    };
    const msg = msgs[totalCorrect] || '继续加油！';

    html += `<div class="result-panel">`;
    html += `<div class="big-score ${scoreClass}">${totalCorrect}/${total}</div>`;
    html += `<div class="score-label">你的得分</div>`;
    html += `<div class="result-msg">${msg}</div>`;
    html += `<div style="display:flex;gap:10px;justify-content:center;">`;
    html += `<button class="retry-btn" onclick="retryLesson()">🔄 重新挑战</button>`;
    if (lesson.id < LESSONS.length) {
      html += `<button class="retry-btn" style="background:var(--color-success)" onclick="openLesson(${lesson.id + 1})">下一课 →</button>`;
    }
    html += `</div></div>`;

    // Save progress
    updateLessonProgress(lesson.id, totalCorrect);
  } else {
    // Progress bar
    html += `<div class="quiz-section">`;
    html += `<div class="quiz-progress-bar">`;
    for (let i = 0; i < lesson.questions.length; i++) {
      let cls = '';
      if (i < currentAnswers.length) {
        cls = currentAnswers[i].correct ? 'correct' : 'wrong';
      } else if (i === currentQuestionIndex) {
        cls = 'current';
      }
      html += `<div class="quiz-dot ${cls}"></div>`;
    }
    html += `</div>`;

    // Question
    const q = lesson.questions[currentQuestionIndex];
    html += `<div class="question-card">`;
    html += `<div class="q-num">第 ${currentQuestionIndex + 1} 题 / 共 ${lesson.questions.length} 题</div>`;
    html += `<div class="q-text">${q.q}</div>`;

    if (q.type === 'choice') {
      html += `<div class="options" id="optionsContainer">`;
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        html += `<button class="option-btn" onclick="selectChoice(${i})" data-idx="${i}">
          <span class="option-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>`;
      });
      html += `</div>`;
    } else if (q.type === 'fill') {
      html += `<div class="fill-input-wrap">`;
      html += `<input type="text" class="fill-input" id="fillInput" placeholder="输入你的答案..." onkeydown="if(event.key==='Enter')submitFill()" autocomplete="off">`;
      html += `<button class="submit-btn" onclick="submitFill()">确认</button>`;
      html += `</div>`;
    }

    html += `<div class="feedback" id="feedback"></div>`;
    html += `</div>`;
    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  // Focus fill input if exists
  setTimeout(() => {
    const fi = document.getElementById('fillInput');
    if (fi) fi.focus();
  }, 100);
}

function selectChoice(idx) {
  const lesson = LESSONS.find(l => l.id === currentLessonId);
  if (!lesson) return;
  const q = lesson.questions[currentQuestionIndex];
  if (q.type !== 'choice') return;

  const correctIdx = q.answer;
  const isCorrect = idx === correctIdx;
  currentAnswers.push({ answer: idx, correct: isCorrect });

  // Update button styles
  const btns = document.querySelectorAll('#optionsContainer .option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct-choice');
    if (i === idx && !isCorrect) b.classList.add('wrong-choice');
    if (i === idx) b.classList.add('selected');
  });

  // Show feedback
  showFeedback(isCorrect, q.options ? q.options[correctIdx] : '');

  // Auto advance
  setTimeout(() => { currentQuestionIndex++; renderLesson(); }, 1200);
}

function submitFill() {
  const input = document.getElementById('fillInput');
  if (!input) return;
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  const lesson = LESSONS.find(l => l.id === currentLessonId);
  if (!lesson) return;
  const q = lesson.questions[currentQuestionIndex];

  // Accept multiple correct answers (case insensitive, trim)
  const correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
  const isCorrect = correctAnswers.some(a => userAnswer.toLowerCase() === a.toLowerCase());
  currentAnswers.push({ answer: userAnswer, correct: isCorrect });

  // Style input
  input.disabled = true;
  input.classList.add(isCorrect ? 'correct-fill' : 'wrong-fill');
  const submitBtn = document.querySelector('.submit-btn');
  if (submitBtn) submitBtn.disabled = true;

  if (!isCorrect) {
    // Show correct answer in input
    input.value = userAnswer + '  →  ' + correctAnswers[0];
  }

  showFeedback(isCorrect, correctAnswers[0]);

  setTimeout(() => { currentQuestionIndex++; renderLesson(); }, 1500);
}

function showFeedback(isCorrect, correctAnswer) {
  const fb = document.getElementById('feedback');
  if (!fb) return;
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect
    ? '✓ 正确！'
    : `✗ 不对。正确答案是：${correctAnswer}`;
}

function retryLesson() {
  currentQuestionIndex = 0;
  currentAnswers = [];
  renderLesson();
}

function renderWelcome() {
  const completed = getCompletedCount();
  document.getElementById('mainContent').innerHTML = `
    <div class="welcome">
      <h2>👋 欢迎来到英语语法学习</h2>
      <p>从零开始，15 课体系化掌握英语核心语法。每课包含知识点讲解和互动练习，进度自动保存。</p>
      <p style="margin-top:12px;font-size:0.85rem;color:var(--color-text-muted)">已完成 ${completed}/15 课</p>
      <button class="start-hint" onclick="openLesson(1)">开始第一课 →</button>
    </div>
  `;
}

// ===== MOBILE NAV =====
function switchMobileTab(tab) {
  if (tab === 0) {
    // Learning tab - show current lesson
    if (currentLessonId) {
      openLesson(currentLessonId);
    } else {
      renderWelcome();
    }
  } else {
    // Progress tab
    renderMobileProgress();
  }
  updateMobileNavActive();
}

function updateMobileNavActive() {
  document.querySelectorAll('.mobile-nav-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 0); // simplified
  });
}

function renderMobileProgress() {
  let html = '<div style="padding:20px 16px 100px">';
  html += '<h2 style="font-size:1.3rem;font-weight:700;margin-bottom:16px">📊 学习进度</h2>';

  const groups = { A1: [], A2: [], B1: [] };
  LESSONS.forEach((l, i) => {
    const group = ['A1','A2','B1'].includes(l.level) ? l.level : 'A2';
    groups[group].push({ lesson: l, index: i });
  });

  for (const [group, items] of Object.entries(groups)) {
    if (items.length === 0) continue;
    const labels = { A1: '基础', A2: '进阶', B1: '中级' };
    html += `<div style="margin-bottom:16px;font-size:0.75rem;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em">${labels[group]} · ${group}</div>`;
    items.forEach(({ lesson, index }) => {
      const p = getLessonProgress(lesson.id);
      html += `<div style="display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:4px;background:var(--color-surface);border-radius:8px;border:1px solid var(--color-border);cursor:pointer" onclick="openLesson(${lesson.id})">
        <span style="width:24px;height:24px;border-radius:6px;background:#f5f5f4;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700">${index+1}</span>
        <span style="flex:1;font-size:0.85rem">${lesson.title}</span>
        <span style="font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:999px;color:white;background:${lesson.level==='A1'?'var(--color-a1)':lesson.level==='A2'?'var(--color-a2)':'var(--color-b1)'}">${lesson.level}</span>
        <span style="font-size:0.8rem;font-weight:600;min-width:24px;text-align:right">${p.completed ? p.bestScore+'/5' : '—'}</span>
      </div>`;
    });
  }
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ===== INIT =====
function init() {
  updateSidebar();
  renderWelcome();
}

function exportProgress() {
  const data = JSON.stringify(progress, null, 0);
  navigator.clipboard.writeText(data).then(() => {
    const btn = document.querySelector('.sync-section .sync-btn:first-child');
    btn.classList.add('copied');
    btn.textContent = '✅ 已复制！粘贴到另一台设备';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📤 导出进度';
    }, 2000);
  }).catch(() => {
    showToast('复制失败，请手动复制', 'error');
  });
}

function importProgress() {
  const input = prompt('请粘贴从另一台设备导出的进度数据：');
  if (!input) return;
  try {
    const data = JSON.parse(input.trim());
    if (typeof data !== 'object' || data === null) throw new Error('格式错误');
    // Validate basic structure
    for (const [key, val] of Object.entries(data)) {
      if (!/^\d+$/.test(key)) continue;
      if (!val || typeof val.completed !== 'boolean' || typeof val.bestScore !== 'number') {
        throw new Error('数据格式不正确');
      }
    }
    // Merge: keep higher bestScore for each lesson
    for (const [key, val] of Object.entries(data)) {
      const existing = progress[key];
      if (existing) {
        existing.completed = existing.completed || val.completed;
        existing.bestScore = Math.max(existing.bestScore, val.bestScore || 0);
        existing.score = Math.max(existing.score || 0, val.score || 0);
      } else {
        progress[key] = val;
      }
    }
    saveProgress(progress);
    updateSidebar();
    if (currentLessonId) renderLesson(); else renderWelcome();
    showToast('进度导入成功！已合并两边的最高分', 'success');
  } catch (e) {
    showToast('数据格式错误，请重新导出后再试', 'error');
  }
}

function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'import-toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

init();
</script>
