<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研英语 — 从零到上岸</title>
<style>
/* ===== Tokens ===== */
:root {
  --bg:#f7f6f3; --surface:#fff; --surface2:#faf9f7; --border:#e6e3de;
  --text:#1c1917; --t2:#595550; --t3:#969088;
  --brand:#e8630a; --brand-l:#fff1e6; --brand-bg:#fefaf7;
  --g:#22a63e; --gl:#eaf7ee; --r:#dc3b3b; --rl:#fef4f4;
  --b:#3b82f6; --bl:#eff6ff; --p:#8b5cf6; --pl:#f5f3ff;
  --gold:#f59e0b; --goldl:#fffbeb;
  --rad:14px; --rads:10px; --radx:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.03);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans SC',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* ===== Top Tab Bar ===== */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:30;overflow-x:auto;
}
.topbar-inner{display:flex;max-width:1100px;margin:0 auto;padding:0 16px;gap:0}
.topbar .logo{
  display:flex;align-items:center;gap:8px;padding:12px 16px 12px 0;
  font-weight:750;font-size:0.95rem;white-space:nowrap;
  border-right:1px solid var(--border);margin-right:4px;cursor:pointer;
}
.topbar .logo .l{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff}
.tab-btn{
  display:flex;align-items:center;gap:5px;padding:12px 14px;border:none;background:none;
  font-size:0.82rem;font-family:var(--font);color:var(--t3);cursor:pointer;
  white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .15s;
  font-weight:550;
}
.tab-btn:hover{color:var(--text);background:var(--surface2)}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}
.tab-btn .tb-icon{font-size:1rem}

/* ===== Layout ===== */
.main-wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

/* ===== Grammar Sidebar Layout ===== */
.gr-layout{display:flex;gap:24px}
.gr-side{width:240px;flex-shrink:0;position:sticky;top:60px;align-self:flex-start;max-height:calc(100vh - 80px);overflow-y:auto}
.gr-side .gr-progress{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);
  padding:16px;margin-bottom:12px
}
.gr-ring-row{display:flex;align-items:center;gap:12px}
.gr-ring{position:relative;width:48px;height:48px;flex-shrink:0}
.gr-ring svg{transform:rotate(-90deg)}
.gr-ring .bg{fill:none;stroke:#ede8e2;stroke-width:5}
.gr-ring .fill{fill:none;stroke:var(--brand);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s}
.gr-ring .in{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:750}
.gr-stats{font-size:0.75rem;color:var(--t3);line-height:1.6}
.gr-stats b{color:var(--text)}
.gr-streak{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#fef3c7,#fde68a);padding:2px 8px;border-radius:999px;font-size:0.68rem;font-weight:650;margin-top:2px}
.gr-nav-list{display:flex;flex-direction:column;gap:1px}
.gr-nav-label{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);padding:12px 0 4px 4px}
.gr-nav-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radx);
  border:none;background:none;cursor:pointer;font-family:var(--font);font-size:0.8rem;color:var(--t2);
  text-align:left;transition:all .15s
}
.gr-nav-item:hover{background:var(--surface2)}
.gr-nav-item.active{background:var(--brand-l);color:var(--brand);font-weight:650}
.gr-nav-item .n{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.64rem;font-weight:700;background:#f0ece6;flex-shrink:0}
.gr-nav-item.active .n{background:var(--brand);color:#fff}
.gr-nav-item .lv{font-size:0.58rem;font-weight:700;padding:1px 6px;border-radius:999px;color:#fff;flex-shrink:0;margin-left:auto}
.gr-nav-item .ck{font-size:0.65rem}
.lv-A1{background:var(--g)} .lv-A2{background:var(--b)} .lv-B1{background:var(--p)} .lv-B2{background:var(--r)}

/* ===== Cards ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.card h3{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--brand);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title{font-size:1.7rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px}
.section-sub{font-size:0.88rem;color:var(--t3);margin-bottom:20px}

/* ===== Explanation ===== */
.point-row{display:flex;gap:10px;padding:11px 14px;background:var(--surface2);border-radius:var(--radx);margin-bottom:6px;font-size:0.85rem;line-height:1.65}
.point-row:hover{background:var(--brand-l)}
.point-row .pi{flex-shrink:0;font-size:1rem;width:22px;text-align:center}
.point-row strong{color:var(--brand)}
.ex-box{margin-top:14px;padding:14px 16px;background:linear-gradient(135deg,#fefaf7,#fff7ed);border-radius:var(--rads);border-left:4px solid var(--brand)}
.ex-box .exl{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--brand);margin-bottom:8px}
.ex-box p{font-size:0.86rem;margin-bottom:4px;line-height:1.7}
.ex-box .en{color:var(--brand);font-weight:550}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:999px;
  font-size:0.88rem;font-weight:650;cursor:pointer;font-family:var(--font);border:none;transition:all .15s
}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(232,99,10,.28)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,99,10,.38)}
.btn-ghost{background:var(--surface2);color:var(--text)}
.btn-ghost:hover{background:var(--border)}
.btn-sm{padding:7px 16px;font-size:0.8rem}

/* ===== Quiz ===== */
.q-dots{display:flex;gap:5px;margin-bottom:16px}
.q-dot{width:28px;height:4px;border-radius:2px;background:var(--border);transition:all .2s}
.q-dot.done{background:var(--g)} .q-dot.wrong{background:var(--r)} .q-dot.cur{background:var(--t2)}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:24px;box-shadow:var(--shadow);animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-card .qt{display:inline-block;padding:3px 10px;background:var(--brand-l);color:var(--brand);border-radius:999px;font-size:0.68rem;font-weight:700;margin-bottom:10px}
.q-card .qtx{font-size:1.05rem;font-weight:550;margin-bottom:18px;line-height:1.7}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{
  display:flex;align-items:center;gap:10px;padding:13px 16px;border:2px solid var(--border);
  border-radius:var(--rads);background:var(--surface);cursor:pointer;font-size:0.9rem;
  font-family:var(--font);transition:all .15s;text-align:left
}
.opt:hover{border-color:#d3ccc3;background:#fdfdfc}
.opt.correct{border-color:var(--g);background:var(--gl)}
.opt.wrong{border-color:var(--r);background:var(--rl)}
.opt:disabled{cursor:default}
.opt .lt{width:28px;height:28px;border-radius:50%;background:#f0ece6;display:flex;align-items:center;justify-content:center;font-size:0.76rem;font-weight:700;color:var(--t2);flex-shrink:0}
.opt.correct .lt{background:var(--g);color:#fff}
.opt.wrong .lt{background:var(--r);color:#fff}
.fill-r{display:flex;gap:8px;align-items:center}
.fill-in{
  flex:1;padding:11px 14px;border:2px solid var(--border);border-radius:var(--rads);
  font-size:0.92rem;font-family:var(--font);outline:none;transition:border-color .15s
}
.fill-in:focus{border-color:var(--brand)}
.fill-in.good{border-color:var(--g);background:var(--gl)}
.fill-in.bad{border-color:var(--r);background:var(--rl)}
.fill-in:disabled{opacity:.9}
.fb-toast{margin-top:12px;padding:10px 14px;border-radius:var(--radx);font-size:0.84rem;display:none;font-weight:550;animation:fadeUp .2s}
.fb-toast.show{display:block}
.fb-toast.ok{background:var(--gl);color:#166534}
.fb-toast.no{background:var(--rl);color:#991b1b}

/* ===== Result ===== */
.result{text-align:center;padding:36px 20px;animation:popIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.result .ri{font-size:3rem;margin-bottom:8px}
.result .rs{font-size:4rem;font-weight:850;letter-spacing:-.03em;line-height:1}
.rs.p{color:var(--g)} .rs.g{color:var(--brand)} .rs.o{color:var(--gold)} .rs.l{color:var(--r)}
.result .rlbl{font-size:0.88rem;color:var(--t3);margin:4px 0 10px}
.result .rm{font-size:0.92rem;font-weight:550;color:var(--t2);margin-bottom:20px}
.result .ra{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ===== Vocab Flashcard ===== */
.flashcard{
  perspective:800px;width:100%;max-width:400px;margin:0 auto;height:220px;cursor:pointer
}
.flashcard .fc-inner{
  position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d
}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.flashcard .fc-front,.flashcard .fc-back{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--rad);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow)
}
.flashcard .fc-back{transform:rotateY(180deg);background:linear-gradient(135deg,#fefaf7,#fff7ed);border-color:var(--brand)}
.flashcard .fc-word{font-size:2.2rem;font-weight:800;letter-spacing:-.01em}
.flashcard .fc-pos{font-size:0.8rem;color:var(--t3);margin-top:4px}
.flashcard .fc-hint{font-size:0.75rem;color:var(--t3);margin-top:16px}
.flashcard .fc-meaning{font-size:1.3rem;font-weight:650;color:var(--brand)}
.flashcard .fc-example{font-size:0.9rem;color:var(--t2);margin-top:10px;text-align:center;line-height:1.5}

/* ===== Long Sentence ===== */
.ls-block{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);
  padding:20px;margin-bottom:12px;position:relative;cursor:pointer;transition:all .2s
}
.ls-block:hover{box-shadow:var(--shadow)}
.ls-block .ls-sentence{font-size:1.1rem;font-weight:550;line-height:1.8;margin-bottom:8px}
.ls-block .ls-source{font-size:0.72rem;color:var(--t3);margin-bottom:6px}
.ls-block .ls-analysis{display:none;margin-top:12px;padding:14px;background:var(--surface2);border-radius:var(--rads);font-size:0.84rem;line-height:1.8}
.ls-block.open .ls-analysis{display:block}
.ls-analysis .hl-main{background:#e8f5e9;padding:1px 4px;border-radius:3px;font-weight:550}
.ls-analysis .hl-sub{background:#fff3e0;padding:1px 4px;border-radius:3px}
.ls-analysis .hl-clue{background:#e3f2fd;padding:1px 4px;border-radius:3px}
.ls-analysis b{color:var(--brand)}

/* ===== Cloze ===== */
.cloze-passage{font-size:0.95rem;line-height:2.2;margin-bottom:18px}
.cloze-blank{display:inline-block}
.cloze-blank select{
  padding:3px 8px;border:2px solid var(--brand);border-radius:4px;
  font-size:0.88rem;font-family:var(--font);background:var(--brand-l);cursor:pointer
}
.cloze-blank.answered select{pointer-events:none}
.cloze-blank.correct select{border-color:var(--g);background:var(--gl)}
.cloze-blank.wrong select{border-color:var(--r);background:var(--rl)}

/* ===== Translation ===== */
.trans-en{
  font-size:1.1rem;font-weight:550;padding:16px;background:var(--surface2);
  border-radius:var(--rads);margin-bottom:14px;line-height:1.8;border-left:4px solid var(--brand)
}
.trans-input{
  width:100%;min-height:100px;padding:14px;border:2px solid var(--border);
  border-radius:var(--rads);font-size:0.92rem;font-family:var(--font);resize:vertical;outline:none
}
.trans-input:focus{border-color:var(--brand)}
.trans-ref{display:none;margin-top:12px;padding:14px;background:var(--gl);border-radius:var(--rads);font-size:0.9rem;line-height:1.7}
.trans-ref.show{display:block}

/* ===== Reading ===== */
.reading-passage{font-size:0.92rem;line-height:1.9;padding:18px;background:var(--surface2);border-radius:var(--rads);margin-bottom:20px}
.reading-passage p{margin-bottom:12px}

/* ===== Sync bar ===== */
.sync-bar{display:flex;gap:8px;margin-top:10px}
.sync-bar button{
  flex:1;padding:6px 0;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);color:var(--t3);font-size:0.72rem;cursor:pointer;
  font-family:var(--font);transition:all .15s
}
.sync-bar button:hover{border-color:var(--brand);color:var(--brand)}

/* ===== Confetti ===== */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:200}
.confetti .cp{
  position:absolute;width:8px;height:8px;border-radius:3px;
  animation:cf 1.6s ease-out forwards
}
@keyframes cf{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:210;
  padding:11px 22px;border-radius:999px;font-size:0.84rem;font-family:var(--font);
  color:#fff;animation:fadeUp .25s;pointer-events:none
}
.toast.good{background:var(--g)} .toast.bad{background:var(--r)}

/* ===== Banked Cloze ===== */
.bc-section{margin-top:32px;border-top:2px solid var(--border);padding-top:24px}
.bc-section h3{font-size:1rem;font-weight:750;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.bc-section .bc-sub{font-size:.8rem;color:var(--t3);margin-bottom:16px}
.bc-wordbank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rads)}
.bc-wordbank .wb-word{
  padding:6px 14px;border:1.5px solid var(--border);border-radius:999px;
  font-size:.84rem;font-weight:600;cursor:pointer;transition:all .15s;
  background:var(--surface);font-family:var(--font)
}
.bc-wordbank .wb-word:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-l)}
.bc-wordbank .wb-word.used{opacity:.3;pointer-events:none;text-decoration:line-through}
.bc-passage{font-size:.92rem;line-height:2.4;margin-bottom:16px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rads)}
.bc-passage .bc-blank{
  display:inline-block;min-width:70px;padding:2px 10px;margin:0 3px;
  border-bottom:2.5px dashed var(--brand);color:var(--brand);font-weight:650;
  cursor:pointer;text-align:center;transition:all .15s
}
.bc-passage .bc-blank:hover{background:var(--brand-l)}
.bc-passage .bc-blank.filled{border-bottom-style:solid}
.bc-passage .bc-blank.correct{border-color:var(--g);color:var(--g);background:var(--gl)}
.bc-passage .bc-blank.wrong{border-color:var(--r);color:var(--r);background:var(--rl)}
.bc-submit{margin-bottom:16px}
.bc-explain{margin-top:16px;display:none}
.bc-explain.show{display:block}
.bc-explain-item{
  padding:10px 14px;margin-bottom:6px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radx);font-size:.84rem;line-height:1.7
}
.bc-explain-item .bci-num{font-weight:750;margin-right:4px}
.bc-explain-item.correct{border-left:3px solid var(--g);background:var(--gl)}
.bc-explain-item.wrong{border-left:3px solid var(--r);background:var(--rl)}
.bc-selected-word{
  display:inline-block;padding:4px 12px;margin:2px 4px;
  background:var(--brand-l);border:1.5px solid var(--brand);border-radius:999px;
  font-size:.82rem;font-weight:600;color:var(--brand);cursor:pointer
}
.bc-selected-word:hover{background:#fee3d0}

/* ===== Section visible/hidden ===== */
.section{display:none}
.section.active{display:block}

/* ===== Welcome in each section ===== */
.welcome{text-align:center;padding:60px 20px}
.welcome .wi{font-size:3.5rem;margin-bottom:12px}
.welcome h2{font-size:1.6rem;font-weight:800;letter-spacing:-.02em}
.welcome p{color:var(--t2);margin-top:8px;max-width:480px;margin-inline:auto;font-size:0.9rem;line-height:1.7}

/* ===== Mobile ===== */
@media(max-width:768px){
  .gr-layout{flex-direction:column}
  .gr-side{width:100%;position:static;max-height:none;display:flex;overflow-x:auto;gap:6px;padding-bottom:4px}
  .gr-side .gr-progress{display:none}
  .gr-nav-list{flex-direction:row;flex-wrap:nowrap;gap:4px}
  .gr-nav-label{display:none}
  .gr-nav-item{white-space:nowrap;font-size:0.74rem;padding:7px 10px}
  .gr-nav-item .lv{display:none}
  .topbar-inner{padding:0 8px}
  .tab-btn{padding:10px 10px;font-size:0.74rem}
  .tab-btn .tb-icon{font-size:0.9rem}
  .main-wrap{padding:16px 12px 40px}
  .section-title{font-size:1.4rem}
  .flashcard{height:180px}
  .flashcard .fc-word{font-size:1.6rem}
  .result .rs{font-size:3rem}
  .card{padding:16px}
  .q-card{padding:16px}
}
</style>
</head>
<body>

<!-- ===== Top Bar ===== -->
<nav class="topbar"><div class="topbar-inner">
  <span class="logo" onclick="switchTab('grammar')"><span class="l">📖</span>考研英语</span>
  <button class="tab-btn active" onclick="switchTab('grammar')" data-tab="grammar"><span class="tb-icon">📝</span>语法</button>
  <button class="tab-btn" onclick="switchTab('vocab')" data-tab="vocab"><span class="tb-icon">📚</span>词汇</button>
  <button class="tab-btn" onclick="switchTab('longsent')" data-tab="longsent"><span class="tb-icon">🔬</span>长难句</button>
  <button class="tab-btn" onclick="switchTab('cloze')" data-tab="cloze"><span class="tb-icon">✂️</span>完形</button>
  <button class="tab-btn" onclick="switchTab('trans')" data-tab="trans"><span class="tb-icon">🌐</span>翻译</button>
  <button class="tab-btn" onclick="switchTab('reading')" data-tab="reading"><span class="tb-icon">📰</span>阅读</button>
</div></nav>

<div class="main-wrap" id="mainWrap"></div>

<script>
// ===== STATE =====
const SK = 'eng_exam_prog_v2';
let prog = (()=>{try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}})();
function save(){localStorage.setItem(SK,JSON.stringify(prog))}
function gp(k,def){const v=prog[k];return v!==undefined?v:def}
let streak = parseInt(localStorage.getItem('eng_exam_streak')||'0');

let curTab = 'grammar';
// grammar
let glid=null, gphase='learn', gqidx=0, gans=[];
// vocab
let vmode='flashcard', vidx=0, vset=0, vans=[], vquizMode=false;
// longsent
let lsidx=0;
// cloze
let czidx=0, czans=[];
// trans
let tridx=0, transwer='';
// reading
let rdidx=0, rdans=[];

function updateStreak(perfect){if(perfect){streak++;localStorage.setItem('eng_exam_streak',streak.toString())}}
function shootConfetti(){
  const w=document.createElement('div');w.className='confetti';
  const cs=['#e8630a','#f59e0b','#3b82f6','#22a63e','#8b5cf6','#ec4899'];
  for(let i=0;i<50;i++){const p=document.createElement('div');p.className='cp';p.style.left=Math.random()*100+'%';p.style.top=-(Math.random()*30)+'px';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';p.style.animationDelay=Math.random()*1.2+'s';w.appendChild(p)}
  document.body.appendChild(w);setTimeout(()=>w.remove(),2500)
}
function toast(m,t){const e=document.createElement('div');e.className='toast '+(t||'good');e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}

// ===== TAB SWITCH =====
function switchTab(tab){
  curTab=tab;glid=null;gphase='learn';vmode='flashcard';vidx=0;vquizMode=false;lsidx=0;czidx=0;czans=[];tridx=0;rdidx=0;rdans=[];
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));

const GR_ICONS=['📝','👤','🔗','⏰','🏃','⏮','🔮','✅','🎨','📍','🔑','🔀','🔄','🔗','🏁','💭','⬆️','💪','🏗️','✂️'];
const GR_TAGS={1:['可数/不可数','a/an/the'],2:['主格/宾格','物主代词'],3:['am/is/are','否定/疑问'],4:['三单+s','do/does'],5:['be+v-ing','正在发生'],6:['动词过去式','did/didn\'t'],7:['will','be going to'],8:['have/has done','since/for'],9:['-ly副词','比较级/最高级'],10:['at/on/in','时间/地点'],11:['can/must/should','+原形'],12:['if条件','真实/虚拟'],13:['be+过去分词','by'],14:['who/which/that','where/whose'],15:['综合','A1-B1'],16:['虚拟语气','if only/wish'],17:['倒装','Never/Only'],18:['强调句','It is...that'],19:['独立主格','with结构'],20:['省略/替代','so/not']};
const GR_LESSONS=[
{id:1,title:'名词与冠词',en:'Nouns & Articles',lvl:'A1',sum:'名词表示人、事物、地点。英语中名词前常需加冠词 a、an 或 the，中文没有此习惯。',pts:['<strong>可数名词</strong>有单复数：apple→apples','<strong>不可数名词</strong>无复数：water, rice, information','<strong>a/an</strong> 用于泛指单数：a cat, an apple','<strong>the</strong> 用于特指：the sun, the book on the table','复数/不可数泛指<strong>不加冠词</strong>：I like music.'],ex:['I saw <span class="en">a dog</span> in the park.','She ate <span class="en">an orange</span>.','<span class="en">The dog</span> is friendly.','<span class="en">Water</span> is important.'],qs:[{t:'c',q:'I need ___ umbrella.',op:['a','an','the','不加'],a:1},{t:'c',q:'___ sun rises in the east.',op:['A','An','The','不加'],a:2},{t:'f',q:'She has two ___ (cat).',a:'cats'},{t:'c',q:'___ milk is good for health.',op:['A','An','The','不加'],a:3},{t:'f',q:'I bought ___ book. (一本)',a:'a'}]},
{id:2,title:'人称代词',en:'Personal Pronouns',lvl:'A1',sum:'人称代词代替人或事物的名称。分为主格（主语）、宾格（宾语）、物主代词。',pts:['<strong>主格</strong>：I,you,he,she,it,we,they','<strong>宾格</strong>：me,you,him,her,it,us,them','<strong>物主</strong>：my,your,his,her,its,our,their','英语<strong>必须有主语</strong>："下雨了"→"It is raining."'],ex:['<span class="en">He</span> is a teacher.','I like <span class="en">her</span>.','This is <span class="en">my</span> book.','<span class="en">It</span> is cold today.'],qs:[{t:'c',q:'___ is my best friend.',op:['Her','She','Hers','Herself'],a:1},{t:'f',q:'Please give ___ the book. (我，宾格)',a:'me'},{t:'c',q:'This is not your pen. It\'s ___.',op:['I','me','my','mine'],a:3},{t:'f',q:'___ are students. (我们)',a:'We'},{t:'c',q:'Look! ___ tail is long.',op:['It','Its','It\'s','His'],a:1}]},
{id:3,title:'Be 动词',en:'Verb "to be"',lvl:'A1',sum:'be 动词是最基础的动词，表示"是、在"。根据主语人称和数变为 am、is、are。',pts:['<strong>I→am</strong>：I am a student.','<strong>he/she/it→is</strong>：She is happy.','<strong>we/you/they→are</strong>：We are friends.','否定：am not/<strong>isn\'t</strong>/<strong>aren\'t</strong>','疑问：be提前 <strong>Is</strong> he a doctor?'],ex:['<span class="en">I am</span> from China.','<span class="en">She is</span> a doctor.','<span class="en">They are</span> happy.','<span class="en">Is it</span> cold?'],qs:[{t:'f',q:'I ___ a student. (be)',a:'am'},{t:'c',q:'She ___ very tall.',op:['am','is','are','be'],a:1},{t:'f',q:'They ___ not here. (缩写)',a:"aren't"},{t:'c',q:'___ you a teacher?',op:['Am','Is','Are','Be'],a:2},{t:'f',q:'He ___ from Japan. (be)',a:'is'}]},
{id:4,title:'一般现在时',en:'Present Simple',lvl:'A1',sum:'表示经常性/习惯性动作或普遍真理。',pts:['<strong>I/You/We/They+原形</strong>','<strong>He/She/It+动词+s/es</strong>','否定：don\'t/<strong>doesn\'t</strong>+原形','疑问：<strong>Do/Does</strong>提前','客观事实：The earth goes around the sun.'],ex:['I <span class="en">get up</span> at 7:00.','She <span class="en">works</span> in a hospital.','He <span class="en">doesn\'t eat</span> meat.','<span class="en">Do</span> you <span class="en">like</span> music?'],qs:[{t:'f',q:'She ___ (play) piano every evening.',a:'plays'},{t:'c',q:'He ___ to school by bus.',op:['go','gos','goes','going'],a:2},{t:'f',q:'They ___ (not like) spicy food.',a:"don't like"},{t:'c',q:'___ she know the answer?',op:['Do','Does','Is','Are'],a:1},{t:'f',q:'The sun ___ (rise) in the east.',a:'rises'}]},
{id:5,title:'现在进行时',en:'Present Continuous',lvl:'A2',sum:'表示此刻正在进行的动作。结构：am/is/are + 动词-ing。',pts:['结构：<strong>am/is/are+动词-ing</strong>','I am reading./She is cooking.','否定：isn\'t/aren\'t+动词-ing','疑问：Is/Are+主语+动词-ing?','<strong>vs一般现在时</strong>：进行时="正在"','know,want,like<strong>不用进行时</strong>'],ex:['She <span class="en">is reading</span> now.','I <span class="en">am studying</span> English.','<span class="en">Are</span> you <span class="en">listening</span>?','I <span class="en">know</span> the answer. (✓)'],qs:[{t:'f',q:'Look! The cat ___ (sleep).',a:'is sleeping'},{t:'c',q:'Listen! Someone ___.',op:['knocks','is knocking','knock','are knocking'],a:1},{t:'f',q:'We ___ (study) now.',a:'are studying'},{t:'c',q:'Which is correct?',op:['I am wanting a drink.','I am wanting it now.','I want a drink.','I wanting a drink.'],a:2},{t:'f',q:'He ___ (not work) today.',a:"isn't working"}]},
{id:6,title:'一般过去时',en:'Past Simple',lvl:'A2',sum:'表示过去某个时间发生的动作。',pts:['结构：<strong>主语+动词过去式</strong>','规则+ed：work→worked, study→studied','<strong>不规则</strong>：go→went,eat→ate,see→saw','否定：<strong>didn\'t+原形</strong>（动词还原！）','疑问：<strong>Did+主语+原形</strong>','be过去：<strong>was/were</strong>'],ex:['I <span class="en">went</span> to Beijing.','She <span class="en">didn\'t come</span>.','<span class="en">Did</span> you <span class="en">watch</span> it?','They <span class="en">were</span> happy.'],qs:[{t:'f',q:'I ___ (go) to the park yesterday.',a:'went'},{t:'c',q:'She ___ the game.',op:["didn't watched","didn't watch",'not watched',"wasn't watch"],a:1},{t:'f',q:'___ (do) you see him?',a:'Did'},{t:'c',q:'They ___ at home.',op:['was','were','are','did'],a:1},{t:'f',q:'He ___ (eat) pizza.',a:'ate'}]},
{id:7,title:'将来时',en:'Future Tenses',lvl:'A2',sum:'will和be going to最常用。',pts:['<strong>will+原形</strong>：临时决定/预测/承诺','<strong>be going to+原形</strong>：计划好/有迹象','否定：<strong>won\'t</strong>(will not)','现在进行时也可表将来：I\'m meeting her tomorrow.','区别：乌云→It\'s going to rain. 纯预测→It will rain.'],ex:['I <span class="en">will call</span> you later.','We <span class="en">are going to visit</span> London.','She <span class="en">won\'t be</span> late.','<span class="en">Will</span> you <span class="en">marry</span> me?'],qs:[{t:'c',q:'Look at those clouds! It ___.',op:['will rain','is going to rain','rains','is raining'],a:1},{t:'f',q:'I ___ (help) you. (临时决定)',a:'will help'},{t:'c',q:'She ___ 20 next month.',op:['is','will be','is going to be','was'],a:1},{t:'f',q:'We ___ (visit) grandparents. (已计划)',a:'are going to visit'},{t:'f',q:'He ___ (not come). (won\'t)',a:"won't come"}]},
{id:8,title:'现在完成时',en:'Present Perfect',lvl:'A2',sum:'连接过去和现在。',pts:['结构：<strong>have/has+过去分词</strong>','影响现在：I<strong>have lost</strong> my key.','持续到现在：I<strong>have lived</strong> here for 10 years.','标志词：already,yet,just,ever,never,<strong>since</strong>,<strong>for</strong>','vs过去时：过去时只讲过去，现在完成强调与"现在"的关系'],ex:['I <span class="en">have finished</span> my homework.','She <span class="en">has been</span> to Paris.','<span class="en">Have</span> you <span class="en">ever eaten</span> sushi?','I <span class="en">haven\'t seen</span> him since Monday.'],qs:[{t:'f',q:'I ___ (finish) my work.',a:'have finished'},{t:'c',q:'She ___ to Japan twice.',op:['went','has been','has gone','goes'],a:1},{t:'f',q:'___ you ever ___ (try) Indian food?',a:'Have tried'},{t:'c',q:'I ___ my key. Can\'t open door.',op:['lost','have lost','am losing','lose'],a:1},{t:'f',q:'He ___ (not call) yet.',a:"hasn't called"}]},
{id:9,title:'形容词与副词',en:'Adj & Adv',lvl:'A1',sum:'形容词修饰名词，副词修饰动词/形容词。副词常以-ly结尾。',pts:['<strong>形容词</strong>修饰名词：a beautiful flower','<strong>副词=形容词+ly</strong>：quick→quickly','<strong>不规则</strong>：good→well,fast→fast,hard→hard','<strong>比较级</strong>-er/more，<strong>最高级</strong>-est/most'],ex:['She is a <span class="en">careful</span> driver.','She drives <span class="en">carefully</span>.','He runs very <span class="en">fast</span>.','This is <span class="en">more interesting</span>.'],qs:[{t:'f',q:'She sings ___ (beautiful).',a:'beautifully'},{t:'c',q:'He is a ___ runner.',op:['fastly','fast','quick','fastest'],a:1},{t:'f',q:'This is ___ (pretty) than that.',a:'prettier'},{t:'c',q:'She did ___ in the exam.',op:['good','well','nice','fine'],a:1},{t:'f',q:'It is the ___ (big) building.',a:'biggest'}]},
{id:10,title:'介词',en:'Prepositions',lvl:'A2',sum:'介词表时间(at/on/in)和空间位置关系。',pts:['<strong>时间at</strong>：具体时刻 at 7:00, at noon','<strong>时间on</strong>：具体天 on Monday','<strong>时间in</strong>：长时间 in May, in 2024','<strong>地点at</strong>：具体点 at the door','<strong>地点on</strong>：表面 on the table','<strong>地点in</strong>：空间内 in Beijing'],ex:['See you <span class="en">at</span> 3:00.','Birthday <span class="en">on</span> June 5th.','Born <span class="en">in</span> 2000.','Book <span class="en">on</span> the desk.'],qs:[{t:'f',q:'I get up ___ 7:00.',a:'at'},{t:'c',q:'We swim ___ summer.',op:['at','on','in','for'],a:2},{t:'f',q:'See you ___ Monday!',a:'on'},{t:'c',q:'Cat is hiding ___ the bed.',op:['at','on','in','under'],a:3},{t:'f',q:'She lives ___ a small town.',a:'in'}]},
{id:11,title:'情态动词',en:'Modal Verbs',lvl:'A2',sum:'表态度和语气——能力、可能性、必要性。后永远跟动词原形。',pts:['<strong>can</strong>：能力/允许','<strong>could</strong>：委婉请求','<strong>must</strong>：必须','<strong>should</strong>：建议','<strong>may/might</strong>：可能','情态动词<strong>无三单变化</strong>：She can. (✓)'],ex:['I <span class="en">can</span> speak English.','You <span class="en">must</span> wear seatbelt.','You <span class="en">should</span> exercise.','<span class="en">Could</span> you open the window?'],qs:[{t:'f',q:'She ___ swim well. (能力)',a:'can'},{t:'c',q:'You ___ smoking.',op:['can stop','should stop','must to stop','stopped'],a:1},{t:'f',q:'___ I use your phone? (委婉)',a:'Could'},{t:'c',q:'It ___ rain. Take umbrella.',op:['must','should','might','can'],a:2},{t:'f',q:'You ___ be 18 to vote. (必须)',a:'must'}]},
{id:12,title:'条件句',en:'Conditionals',lvl:'B1',sum:'表达"如果…就…"。第一条件句(真实)和第二条件句(虚拟)。',pts:['<strong>First</strong>：If+现在时, will+原形','<strong>Second</strong>：If+过去时, would+原形','First：条件<strong>可能发生</strong>','Second：条件<strong>不现实/假设</strong>','虚拟语气：If I <strong>were</strong> you, I would go.'],ex:['<span class="en">If</span> you study, you <span class="en">will pass</span>.','<span class="en">If</span> I <span class="en">were</span> you, I <span class="en">would accept</span>.','<span class="en">If</span> I <span class="en">had</span> money, I <span class="en">would buy</span> a house.'],qs:[{t:'f',q:'If it rains, I ___ (stay) home.',a:'will stay'},{t:'c',q:'If I ___ you, I would apologize.',op:['am','was','were','be'],a:2},{t:'f',q:'If you heat water, it ___ (boil).',a:'boils'},{t:'c',q:'If she ___ harder, she will get promoted.',op:['work','works','worked','will work'],a:1},{t:'f',q:'If I had time, I ___ (learn) Spanish.',a:'would learn'}]},
{id:13,title:'被动语态',en:'Passive Voice',lvl:'B1',sum:'强调动作承受者。结构：be+过去分词。',pts:['结构：<strong>be+过去分词</strong>(be随时态变化)','现在：am/is/are+done','过去：was/were+done','完成：have/has been+done','情态：can/must+be+done','<strong>何时用</strong>：执行者不重要/未知'],ex:['English <span class="en">is spoken</span> worldwide.','The cake <span class="en">was made</span> by mom.','The room <span class="en">has been cleaned</span>.','Door <span class="en">must be locked</span> at night.'],qs:[{t:'f',q:'Letters ___ (send) yesterday.',a:'were sent'},{t:'c',q:'This book ___ by Mark Twain.',op:['wrote','was written','is writing','has written'],a:1},{t:'f',q:'The room ___ (clean) every day.',a:'is cleaned'},{t:'c',q:'Homework must ___ by Friday.',op:['finish','finished','be finished','being finished'],a:2},{t:'f',q:'Window ___ (break) by a ball.',a:'was broken'}]},
{id:14,title:'定语从句',en:'Relative Clauses',lvl:'B1',sum:'修饰名词。引导词：who,which,that,whose,where。',pts:['<strong>who</strong>：指人','<strong>which</strong>：指物','<strong>that</strong>：可人可物，更口语','<strong>whose</strong>：表示"谁的"','<strong>where</strong>：指地点'],ex:['The woman <span class="en">who</span> is talking is my boss.','This is the restaurant <span class="en">where</span> we met.','I like books <span class="en">that</span> make me think.','The student <span class="en">whose</span> project won.'],qs:[{t:'f',q:'The person ___ called you is waiting.',a:'who'},{t:'c',q:'The car ___ he bought is expensive.',op:['who','whose','which','where'],a:2},{t:'f',q:'This is the school ___ I studied.',a:'where'},{t:'c',q:'I met a girl ___ mother is a pilot.',op:['who','which','whose','where'],a:2},{t:'f',q:'The movie ___ we watched was boring.',a:'that'}]},
{id:15,title:'综合复习',en:'Final Review',lvl:'B1',sum:'综合检测全部基础语法点。',pts:['覆盖：时态、冠词、介词、情态、条件、被动、定从','建议先完成前面14课','错题可回到对应课程重学','学完后语法应达<strong>B1</strong>水平'],ex:['<span class="en">If</span> I had known, I <span class="en">would have helped</span>.','Report <span class="en">must be submitted</span> by Friday.','She is the teacher <span class="en">who inspired</span> me.'],qs:[{t:'c',q:'If it ___ tomorrow, cancel.',op:['rain','rains','rained','will rain'],a:1},{t:'f',q:'Decision ___ (make) yesterday. (被动)',a:'was made'},{t:'c',q:'I have lived here ___ 2015.',op:['in','for','since','at'],a:2},{t:'f',q:'She is the one ___ helped me.',a:'who'},{t:'c',q:'By the time we arrived, movie ___.',op:['already started','had already started','has already started','starts'],a:1}]},
// === B2 考研高级语法 ===
{id:16,title:'虚拟语气进阶',en:'Subjunctive Advanced',lvl:'B2',sum:'虚拟语气是考研重点。除了if条件句，还有wish/as if/it is time/建议命令等结构。',pts:['<strong>wish+过去时</strong>：对现在的虚拟 I wish I <strong>were</strong> rich.','<strong>wish+had done</strong>：对过去的虚拟 I wish I <strong>had studied</strong> harder.','<strong>as if/as though+虚拟</strong>：He talks as if he <strong>knew</strong> everything.','<strong>would rather+过去时</strong>：I\'d rather you <strong>stayed</strong> here.','<strong>建议/命令+ (should) do</strong>：I suggest that he <strong>(should) go</strong>.','<strong>It is time+过去时</strong>：It\'s time we <strong>left</strong>.'],ex:['I <span class="en">wish</span> I <span class="en">were</span> taller.','She talks as <span class="en">if</span> she <span class="en">owned</span> the place.','It\'s high time you <span class="en">started</span> studying.','The doctor suggested that he <span class="en">take</span> a rest.'],qs:[{t:'f',q:'I wish I ___ (be) a bird.',a:'were'},{t:'c',q:'She speaks as if she ___ everything.',op:['knows','knew','has known','is knowing'],a:1},{t:'f',q:'It is time we ___ (go) home.',a:'went'},{t:'c',q:'I suggested that he ___ early.',op:['leaves','left','leave','leaving'],a:2},{t:'f',q:'I wish I ___ (study) harder before the exam.',a:'had studied'}]},
{id:17,title:'倒装结构',en:'Inversion',lvl:'B2',sum:'考研阅读理解中大量出现倒装句。否定词/only/so等位于句首时需部分倒装（助动词提前）。',pts:['<strong>否定词句首→部分倒装</strong>：Never <strong>have I seen</strong> such beauty.','<strong>only+状语句首→倒装</strong>：Only then <strong>did I realize</strong> my mistake.','<strong>Not only...but also...</strong>：Not only <strong>is he</strong> smart, but also kind.','<strong>so/neither/nor</strong>：So <strong>do I</strong>. Neither <strong>can she</strong>.','<strong>完全倒装</strong>（地点状语+谓语+主语）：Here <strong>comes the bus</strong>.','<strong>as/though让步倒装</strong>：Young <strong>as he is</strong>, he knows a lot.'],ex:['<span class="en">Never</span> have I <span class="en">felt</span> so happy.','<span class="en">Not until</span> yesterday <span class="en">did</span> he <span class="en">know</span> the truth.','<span class="en">Hardly</span> had I <span class="en">arrived</span> when it rained.','Try <span class="en">as</span> he <span class="en">might</span>, he couldn\'t solve it.'],qs:[{t:'c',q:'Never ___ such a thing.',op:['I have seen','have I seen','I saw','I see'],a:1},{t:'f',q:'Only then ___ (do) I understand.',a:'did'},{t:'c',q:'Not only ___ but also plays piano.',op:['he sings','does he sing','he sing','sings he'],a:1},{t:'f',q:'Hardly ___ (have) we started when it rained.',a:'had'},{t:'c',q:'___ as he is, he is experienced.',op:['Young','Being young','Though young','A young'],a:0}]},
{id:18,title:'强调句型',en:'Emphatic Structures',lvl:'B2',sum:'强调是考研翻译和写作的加分项。最核心的是It is...that...分裂句。',pts:['<strong>It is/was...that...</strong>：It was <strong>Tom</strong> that/who broke the window.','强调主语/宾语/状语均可放入It is...that框架','<strong>do/does/did+原形</strong>强调谓语：I <strong>did finish</strong> the work.','<strong>what从句强调</strong>：What I need <strong>is</strong> a good rest.','<strong>双重否定表强调</strong>：It is <strong>not uncommon</strong>.','<strong>倒装强调</strong>：On no account <strong>should you</strong> lie.'],ex:['<span class="en">It is</span> hard work <span class="en">that</span> leads to success.','<span class="en">What</span> we need <span class="en">is</span> more time.','I <span class="en">did see</span> him yesterday.','It is <span class="en">not without</span> reason that he resigned.'],qs:[{t:'c',q:'It was in the park ___ we first met.',op:['where','that','which','when'],a:1},{t:'f',q:'I ___ (do) believe you.',a:'do'},{t:'c',q:'___ is important is your attitude.',op:['That','What','It','This'],a:1},{t:'f',q:'It was John ___ broke the window.',a:'that'},{t:'c',q:'On no account ___ give up.',op:['you should','should you','you would','do you'],a:1}]},

function renderGrammar(){
  let h='';
  // sidebar
  const done=GR_LESSONS.filter(l=>gp('gr'+l.id,{}).completed).length;
  const avg=(()=>{const c=GR_LESSONS.filter(l=>gp('gr'+l.id,{}).completed);return c.length?Math.round(c.reduce((s,l)=>s+gp('gr'+l.id,{}).bestScore,0)/c.length):null})();
  h+=`<div class="gr-layout"><div class="gr-side">`;
  h+=`<div class="gr-progress"><div class="gr-ring-row"><div class="gr-ring"><svg width="48" height="48" viewBox="0 0 48 48"><circle class="bg" cx="24" cy="24" r="21"/><circle class="fill" id="gRing" cx="24" cy="24" r="21" stroke-dasharray="131.95" stroke-dashoffset="131.95"/></svg><div class="in" id="gPct">0%</div></div><div class="gr-stats"><div>完成 <b id="gDone">${done}</b>/20 课</div><div>均分 <b id="gAvg">${avg!==null?avg+'/5':'-'}</b></div><span class="gr-streak" id="gStr">🔥 x${streak}</span></div></div></div>`;
  h+=`<div class="gr-nav-list">`;
  const groups={A1:[],A2:[],B1:[],B2:[]};
  GR_LESSONS.forEach((l,i)=>{const g=['A1','A2','B1','B2'].includes(l.lvl)?l.lvl:'A2';groups[g].push({l,i})});
  const glbl={A1:'基础入门',A2:'能力进阶',B1:'中级提升',B2:'考研进阶'};
  for(const[g,items]of Object.entries(groups)){
    if(!items.length)continue;
    h+=`<div class="gr-nav-label">${glbl[g]}</div>`;
    items.forEach(({l,i})=>{
      const p=gp('gr'+l.id,{});const act=glid===l.id?' active':'';
      const chk=p.completed?'✓':'';const ccl=p.completed?'color:var(--g)':'color:transparent';
      h+=`<button class="gr-nav-item${act}" onclick="grOpen(${l.id})"><span class="n">${i+1}</span>${l.title}<span class="lv lv-${l.lvl}">${l.lvl}</span><span class="ck" style="${ccl}">${chk}</span></button>`;
    });
  }
  h+=`</div><div class="sync-bar"><button onclick="exportProg()">📤导出</button><button onclick="importProg()">📥导入</button></div></div>`;
  // main
  h+=`<div style="flex:1;min-width:0">`;
  if(!glid){h+=grWelcome()}else{h+=grLesson()}
  if(glid){h+=renderBankedCloze('grammar')}
  h+=`</div></div>`;
  document.getElementById('mainWrap').innerHTML=h;
  setTimeout(bcBindWordBank,80);
  // ring
  const pct=Math.round(done/20*100);
  document.getElementById('gPct').textContent=pct+'%';
  document.getElementById('gRing').style.strokeDashoffset=131.95-131.95*done/20;
  document.getElementById('gDone').textContent=done;
  if(avg!==null)document.getElementById('gAvg').textContent=avg+'/5';
  if(streak<=1)document.getElementById('gStr').style.display='none';
}

function grWelcome(){
  const done=GR_LESSONS.filter(l=>gp('gr'+l.id,{}).completed).length;
  return `<div class="welcome"><div class="wi">📝</div><h2>英语语法体系化学习</h2><p>20节课从零到考研难度，A1→B2逐步提升。每课先学知识点，再闯关练习，即时反馈。</p><div style="display:flex;gap:5px;justify-content:center;margin:18px 0;flex-wrap:wrap">${GR_LESSONS.map((l,i)=>`<div style="width:9px;height:9px;border-radius:50%;background:${gp('gr'+l.id,{}).completed?'var(--brand)':'var(--border)'}"></div>`).join('')}</div><p style="color:var(--t3);font-size:.84rem;margin-bottom:16px">已完成 ${done}/20 课${(()=>{const a=(()=>{const c=GR_LESSONS.filter(l=>gp('gr'+l.id,{}).completed);return c.length?Math.round(c.reduce((s,l)=>s+gp('gr'+l.id,{}).bestScore,0)/c.length):null})();return a!==null?' · 均分 '+a+'/5':''})()}</p><button class="btn btn-primary" onclick="grOpen(1)">🚀 开始学习</button></div>`;
}

function grOpen(id){glid=id;gphase='learn';gqidx=0;gans=[];renderGrammar();window.scrollTo({top:0,behavior:'smooth'})}
function grStartQuiz(){gphase='quiz';gqidx=0;gans=[];renderGrammar()}
function grBackLearn(){gphase='learn';renderGrammar()}

function grLesson(){
  const l=GR_LESSONS.find(x=>x.id===glid);if(!l)return grWelcome();
  let h=`<div><div style="margin-bottom:20px"><span style="display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font-size:.75rem;font-weight:700;color:#fff;background:${l.lvl==='A1'?'var(--g)':l.lvl==='A2'?'var(--b)':l.lvl==='B1'?'var(--p)':'var(--r)'}">${GR_ICONS[l.id-1]} ${l.lvl} · 第${l.id}课</span><h2 style="font-size:1.7rem;font-weight:800;letter-spacing:-.02em;margin-top:8px">${l.title}</h2><div style="font-size:.88rem;color:var(--t3)">${l.en}</div></div>`;

  if(gphase==='learn'){
    h+=`<div style="display:flex;gap:8px;margin-bottom:18px">${(GR_TAGS[l.id]||[]).map(t=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:999px;font-size:.76rem;color:var(--t2)">📌 ${t}</span>`).join('')}</div>`;
    h+=`<div class="card"><h3>📚 知识点讲解</h3><p style="font-size:.9rem;color:var(--t2);line-height:1.75;margin-bottom:14px">${l.sum}</p>`;
    l.pts.forEach((pt,i)=>{const icons=['❶','❷','❸','❹','❺','❻'];h+=`<div class="point-row"><span class="pi">${icons[i]||'•'}</span><span>${pt}</span></div>`});
    h+=`</div>`;
    h+=`<div class="ex-box"><div class="exl">💡 例句</div>${l.ex.map(e=>`<p>${e}</p>`).join('')}</div>`;
    const p=gp('gr'+l.id,{});
    h+=`<div style="text-align:center;margin-top:24px"><button class="btn btn-primary" onclick="grStartQuiz()" style="font-size:1.05rem;padding:15px 44px">✏️ 开始练习 (${l.qs.length}题)</button>${p.completed?`<p style="margin-top:10px;font-size:.8rem;color:var(--t3)">上次得分：${p.bestScore}/5 · ${p.lastAttempt}</p>`:''}</div>`;
  } else {
    h+=`<button onclick="grBackLearn()" style="background:none;border:none;color:var(--brand);cursor:pointer;font-size:.85rem;font-family:var(--font);font-weight:600;margin-bottom:16px">← 返回查看知识点</button>`;
    if(gqidx>=l.qs.length){
      const correct=gans.filter(a=>a.correct).length;
      let sc='l',icon='🌱',msg='万事开头难，回去复习再试！';
      if(correct===5){sc='p';icon='🎉';msg='满分！太棒！';shootConfetti();updateStreak(true)}
      else if(correct>=4){sc='g';icon='🌟';msg='很好！只错一个。'}
      else if(correct>=3){sc='o';icon='📖';msg='不错，建议复习知识点后重做。'}
      h+=`<div class="result"><div class="card"><div class="ri">${icon}</div><div class="rs ${sc}">${correct}/5</div><div class="rlbl">你的得分</div><div class="rm">${msg}</div><div class="ra"><button class="btn btn-ghost" onclick="grStartQuiz()">🔄 重做</button><button class="btn btn-ghost" onclick="grBackLearn()">📖 复习</button>${l.id<GR_LESSONS.length?`<button class="btn btn-primary" onclick="grOpen(${l.id+1})">下一课 →</button>`:''}</div></div></div>`;
      const p=gp('gr'+l.id,{});p.completed=true;p.score=correct;p.bestScore=Math.max(p.bestScore||0,correct);p.lastAttempt=new Date().toISOString().split('T')[0];prog['gr'+l.id]=p;save();renderGrammar();
    } else {
      const q=l.qs[gqidx];
      h+=`<div class="q-card"><div class="q-dots">${l.qs.map((_,i)=>{let c='';if(i<gans.length)c=gans[i].correct?'done':'wrong';else if(i===gqidx)c='cur';return`<div class="q-dot ${c}"></div>`}).join('')}</div><span class="qt">${q.t==='c'?'🔤 选择':'✏️ 填空'}</span>`;
      h+=`<div class="qtx">${q.q}</div>`;
      if(q.t==='c'){h+=`<div class="opts">${['A','B','C','D'].map((lt,i)=>`<button class="opt" onclick="grSel(${i})"><span class="lt">${lt}</span>${q.op[i]}</button>`).join('')}</div>`}
      else{h+=`<div class="fill-r"><input class="fill-in" id="grFill" placeholder="输入答案..." onkeydown="if(event.key==='Enter')grSub()" autocomplete="off"><button class="btn btn-primary btn-sm" onclick="grSub()">确认</button></div>`}
      h+=`<div class="fb-toast" id="grFb"></div></div>`;
    }
  }
  h+=`</div>`;
  setTimeout(()=>{const f=document.getElementById('grFill');if(f)f.focus()},100);
  return h;
}
function grSel(idx){
  const q=GR_LESSONS.find(l=>l.id===glid).qs[gqidx];const ok=idx===q.a;gans.push({correct:ok});
  document.querySelectorAll('.opts .opt').forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add('correct');if(i===idx&&!ok)b.classList.add('wrong')});
  const fb=document.getElementById('grFb');fb.className='fb-toast show '+(ok?'ok':'no');fb.textContent=ok?'✓ 正确！':'✗ 正确答案：'+q.op[q.a];
  setTimeout(()=>{gqidx++;grLesson()},1100)
}
function grSub(){
  const inp=document.getElementById('grFill');if(!inp||!inp.value.trim())return;
  const q=GR_LESSONS.find(l=>l.id===glid).qs[gqidx];
  const ua=inp.value.trim();const ca=Array.isArray(q.a)?q.a:[q.a];
  const ok=ca.some(a=>ua.toLowerCase()===a.toLowerCase());gans.push({correct:ok});
  inp.disabled=true;inp.classList.add(ok?'good':'bad');
  if(!ok)inp.value=ua+' → '+ca[0];
  const fb=document.getElementById('grFb');fb.className='fb-toast show '+(ok?'ok':'no');fb.textContent=ok?'✓ 正确！':'✗ 正确答案：'+ca[0];
  document.querySelector('.fill-r .btn')?.setAttribute('disabled','');
  setTimeout(()=>{gqidx++;grLesson()},1500)
}

function renderVocab(){
  const vs=VOCAB_SETS[vset];if(!vs)return;
  let h=`<div class="section-title">📚 考研高频词汇</div><div class="section-sub">共 ${VOCAB_SETS.reduce((s,set)=>s+set.words.length,0)} 词，选自考英语大纲核心词。点击翻转卡片看释义。</div>`;
  // set tabs
  h+=`<div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap">${VOCAB_SETS.map((s,i)=>`<button class="btn ${i===vset?'btn-primary':'btn-ghost'} btn-sm" onclick="vset=${i};vidx=0;vmode='flashcard';renderVocab()">${s.name}</button>`).join('')}</div>`;

  if(vmode==='flashcard'&&!vquizMode){
    const w=vs.words[vidx];
    h+=`<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px"><span style="font-size:.84rem;color:var(--t3)">${vidx+1}/${vs.words.length}</span><div style="flex:1;height:3px;background:var(--border);border-radius:2px"><div style="height:100%;background:var(--brand);border-radius:2px;width:${(vidx+1)/vs.words.length*100}%;transition:width .3s"></div></div></div>`;
    h+=`<div class="flashcard" id="fCard" onclick="this.classList.toggle('flipped')"><div class="fc-inner"><div class="fc-front"><div class="fc-word">${w.w}</div><div class="fc-pos">${w.p}</div><div class="fc-hint">👆 点击翻转查看释义</div></div><div class="fc-back"><div class="fc-meaning">${w.m}</div><div class="fc-example">"${w.ex}"<br><span style="color:var(--t3);font-size:.82rem">${w.ch}</span></div></div></div></div>`;
    h+=`<div style="display:flex;gap:8px;justify-content:center;margin-top:16px"><button class="btn btn-ghost btn-sm" onclick="vidx=Math.max(0,vidx-1);renderVocab()" ${vidx===0?'disabled':''}>← 上一个</button><button class="btn btn-ghost btn-sm" onclick="vidx=Math.min(vs.words.length-1,vidx+1);renderVocab()" ${vidx===vs.words.length-1?'disabled':''}>下一个 →</button><button class="btn btn-primary btn-sm" onclick="vquizMode=true;vmode='quiz';vans=[];vidx=0;renderVocab()">📝 测验模式</button></div>`;
  } else if(vquizMode){
    // Quiz mode
    if(vidx>=vs.words.length){
      const correct=vans.filter(a=>a.correct).length;
      h+=`<div class="result"><div class="card"><div class="ri">${correct===vs.words.length?'🎉':'📖'}</div><div class="rs ${correct===vs.words.length?'p':correct>=vs.words.length*0.8?'g':correct>=vs.words.length*0.6?'o':'l'}">${correct}/${vs.words.length}</div><div class="rlbl">测验得分</div><div class="ra"><button class="btn btn-ghost" onclick="vquizMode=false;vidx=0;renderVocab()">📖 返回学习</button><button class="btn btn-primary" onclick="vquizMode=true;vans=[];vidx=0;renderVocab()">🔄 重测</button></div></div></div>`;
    } else {
      const w=vs.words[vidx];
      const wrongs=[];while(wrongs.length<3){const r=vs.words[Math.floor(Math.random()*vs.words.length)];if(r.w!==w.w&&!wrongs.find(x=>x.w===r.w))wrongs.push(r)}
      const opts=[w,...wrongs].sort(()=>Math.random()-.5);
      const correctIdx=opts.findIndex(o=>o.w===w.w);
      h+=`<div class="q-card"><div class="q-dots">${vs.words.map((_,i)=>{let c='';if(i<vans.length)c=vans[i].correct?'done':'wrong';else if(i===vidx)c='cur';return`<div class="q-dot ${c}"></div>`}).join('')}</div><span class="qt">🔤 选择对应的英文</span><div class="qtx" style="font-size:1.3rem;text-align:center">${w.m}</div>`;
      h+=`<div class="opts">${opts.map((o,i)=>`<button class="opt" onclick="vocabSel(${i},${correctIdx})"><span class="lt">${['A','B','C','D'][i]}</span>${o.w}</button>`).join('')}</div>`;
      h+=`<div class="fb-toast" id="vFb"></div></div>`;
      h+=`<div style="margin-top:10px;display:flex;gap:8px;justify-content:space-between"><span style="font-size:.78rem;color:var(--t3)">${vidx+1}/${vs.words.length}</span><button class="btn btn-ghost btn-sm" onclick="vquizMode=false;renderVocab()">退出测验</button></div>`;
    }
  }
  h+=renderBankedCloze('vocab');
  document.getElementById('mainWrap').innerHTML=h;
  setTimeout(bcBindWordBank,80);
  // reset flashcard
  const fc=document.getElementById('fCard');if(fc)fc.classList.remove('flipped');
}
function vocabSel(idx,correctIdx){
  const ok=idx===correctIdx;vans.push({correct:ok});
  const btns=document.querySelectorAll('.opts .opt');
  btns.forEach((b,i)=>{b.disabled=true;if(i===correctIdx)b.classList.add('correct');if(i===idx&&!ok)b.classList.add('wrong')});
  const fb=document.getElementById('vFb');if(fb){fb.className='fb-toast show '+(ok?'ok':'no');fb.textContent=ok?'✓ 正确！':'✗ 看仔细哦'}
  setTimeout(()=>{vidx++;renderVocab()},1000)
}

function renderCloze(){
  const cp=CLOZE_PASSAGES[czidx];if(!cp)return;
  let h=`<div class="section-title">✂️ 完形填空</div><div class="section-sub">${CLOZE_PASSAGES.length} 篇模拟，考研经典题型。</div>`;
  h+=`<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">${CLOZE_PASSAGES.map((p,i)=>`<button class="btn ${i===czidx?'btn-primary':'btn-ghost'} btn-sm" onclick="czidx=${i};czans=[];renderCloze()">${p.title}</button>`).join('')}</div>`;

  if(czans.length===cp.qs.length){
    const correct=czans.filter(a=>a.correct).length;
    const total=cp.qs.length;
    h+=`<div class="result"><div class="card"><div class="ri">${correct===total?'🎉':'📖'}</div><div class="rs ${correct===total?'p':correct>=total*0.8?'g':correct>=total*0.6?'o':'l'}">${correct}/${total}</div><div class="rm">${correct===total?'全对！':'注意上下文逻辑线索'}</div><div class="ra"><button class="btn btn-ghost" onclick="czans=[];renderCloze()">🔄 重做</button>${czidx<CLOZE_PASSAGES.length-1?`<button class="btn btn-primary" onclick="czidx++;czans=[];renderCloze()">下一篇 →</button>`:''}</div></div></div>`;
    h+=renderBankedCloze('cloze');
    document.getElementById('mainWrap').innerHTML=h;setTimeout(bcBindWordBank,80);return;
  }
  h+=`<div class="card"><h3>${cp.title}</h3><p style="font-size:.95rem;line-height:2.3">`;
  let blankCount=0;
  const allBlanks=cp.text.filter(s=>s.length>1); // segments with blanks
  const letters=['A','B','C','D'];
  cp.text.forEach(seg=>{
    const txt=seg[0]; // first element is always text
    const hasBlank=seg.length>1; // has options array as second element
    h+=txt;
    if(hasBlank){
      const qi=blankCount++;const answered=qi<czans.length;
      h+=`<span class="cloze-blank${answered?(czans[qi].correct?' correct':' wrong'):''}">`;
      h+=`<select onchange="czAns(${qi},this.value)" ${answered?'disabled':''} style="${answered?(czans[qi].correct?'border-color:var(--g);background:var(--gl)':'border-color:var(--r);background:var(--rl)'):''}">`;
      h+=`<option value="">?</option>`;
      const optObj=seg[1][0]; // [{a:'...',b:'...',c:'...',d:'...',correct:N}]
      const keys=['a','b','c','d'];
      for(let i=0;i<keys.length;i++){
        if(optObj[keys[i]])h+=`<option value="${i}" ${answered&&czans[qi].answer===i?'selected':''}>${letters[i]}. ${optObj[keys[i]]}</option>`;
      }
      h+=`</select></span>`;
    }
  });
  h+=`</p><div style="margin-top:14px;font-size:.8rem;color:var(--t3)">已填 ${czans.length}/${allBlanks.length} · 选完最后一空自动出分</div></div>`;
  h+=renderBankedCloze('cloze');
  document.getElementById('mainWrap').innerHTML=h;
  setTimeout(bcBindWordBank,80);
}

function czAns(qi,val){
  if(val==='')return;
  const cp=CLOZE_PASSAGES[czidx];const blanks=cp.text.filter(s=>s.length>1);
  const optObj=blanks[qi][1][0];const correctIdx=optObj.correct||0;
  const answer=parseInt(val);
  czans.push({answer,correct:answer===correctIdx});
  renderCloze();
}

}

function renderBankedCloze(sectionKey){
  const list=BANKED_CLOZES[sectionKey];if(!list||!list.length)return '';
  let h=``;
  list.forEach((bc,bcIdx)=>{
    const stateKey=`bc_${sectionKey}_${bcIdx}`;
    let bcState=prog[stateKey]||{done:false,ans:[],score:0};
    h+=`<div class="bc-section"><h3>📋 ${bc.title}</h3><div class="bc-sub">选词填空 · ${bc.blanks.length}个空 · ${bc.wordBank.length}个候选词（有2-3个干扰项）</div>`;
    // Word bank
    h+=`<div class="bc-wordbank" id="wbank_${sectionKey}_${bcIdx}">`;
    bc.wordBank.forEach((w,i)=>{
      const used=bcState.ans&&bcState.ans.some(a=>a.wordIdx===i);
      h+=`<span class="wb-word${used?' used':''}" data-widx="${i}" data-section="${sectionKey}" data-bc="${bcIdx}">${w}</span>`;
    });
    h+=`</div>`;
    // Passage with selectable blanks
    h+=`<div class="bc-passage" id="bcpass_${sectionKey}_${bcIdx}">`;
    let blankIdx=0;
    const parts=bc.passage.split(/\((\d+)\)/);
    // Actually parse the numbered blanks
    let txt='';let inBlank=false;
    for(let i=0;i<bc.passage.length;i++){
      const ch=bc.passage[i];
      if(ch==='('&&bc.passage[i+1]&&/\d/.test(bc.passage[i+1])){
        if(txt){h+=txt;txt=''}
        inBlank=true;continue
      }
      if(inBlank&&ch===')'){
        const bi=blankIdx++;
        const filled=bcState.ans&&bcState.ans[bi]!==undefined;
        const isCorrect=bcState.done&&bcState.ans[bi]!==undefined&&bcState.ans[bi].wordIdx===bc.blanks[bi].answer;
        let word='___';
        if(filled){const wi=bcState.ans[bi].wordIdx;word=bc.wordBank[wi]}
        const cls=filled?(bcState.done?(isCorrect?'correct':'wrong'):'filled'):'';
        h+=`<span class="bc-blank ${cls}" id="bk_${sectionKey}_${bcIdx}_${bi}" onclick="bcSelectBlank('${sectionKey}',${bcIdx},${bi})" data-bi="${bi}">${word}</span>`;
        inBlank=false;continue
      }
      if(!inBlank)txt+=ch
    }
    if(txt)h+=txt;
    h+=`</div>`;
    // Buttons
    if(!bcState.done){
      h+=`<div class="bc-submit"><button class="btn btn-primary btn-sm" onclick="bcCheck('${sectionKey}',${bcIdx})">✅ 提交答案</button> <button class="btn btn-ghost btn-sm" onclick="bcReset('${sectionKey}',${bcIdx})">🔄 重置</button></div>`;
    } else {
      h+=`<div class="bc-submit"><span style="color:var(--g);font-weight:700">得分：${bcState.score}/${bc.blanks.length}</span> <button class="btn btn-ghost btn-sm" onclick="bcReset('${sectionKey}',${bcIdx})">🔄 重做</button></div>`;
      // Explanations
      h+=`<div class="bc-explain show">`;
      bc.blanks.forEach((bl,i)=>{
        const filled=bcState.ans&&bcState.ans[i]!==undefined;
        const isCorrect=filled&&bcState.ans[i].wordIdx===bl.answer;
        const userWord=filled?bc.wordBank[bcState.ans[i].wordIdx]:'未填';
        h+=`<div class="bc-explain-item ${isCorrect?'correct':'wrong'}"><span class="bci-num">${i+1}.</span> 你选：<b>${userWord}</b> ${isCorrect?'✓':'→ 正确答案：<b>'+bc.wordBank[bl.answer]+'</b>'}<br><span style="color:var(--t2);font-size:.8rem">${bl.explain}</span></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  return h;
}

      const widx=parseInt(this.dataset.widx);
      const sk=this.dataset.section;const bi=parseInt(this.dataset.bc);
      bcSelectedWord={wordIdx:widx,sectionKey:sk,bcIdx:bi};
      // Highlight
      document.querySelectorAll('.bc-wordbank .wb-word').forEach(w=>w.style.outline='none');
      this.style.outline='2px solid var(--brand)';this.style.outlineOffset='2px';
    }
  });
}

function bcSelectBlank(sk,bi,blankIdx){
  if(!bcSelectedWord||bcSelectedWord.sectionKey!==sk||bcSelectedWord.bcIdx!==bi)return;
  const stateKey=`bc_${sk}_${bi}`;
  let st=prog[stateKey]||{done:false,ans:[],score:0};
  if(st.done)return;
  // Update answer
  while(st.ans.length<=blankIdx)st.ans.push(undefined);
  st.ans[blankIdx]={wordIdx:bcSelectedWord.wordIdx};
  prog[stateKey]=st;save();
  bcSelectedWord=null;
  // Re-render the section
  switch(sk){
    case 'grammar':renderGrammar();break
    case 'vocab':renderVocab();break
    case 'longsent':renderLongSent();break
    case 'cloze':renderCloze();break
    case 'trans':renderTrans();break
    case 'reading':renderReading();break
  }
}

function bcCheck(sk,bi){
  const stateKey=`bc_${sk}_${bi}`;
  let st=prog[stateKey]||{done:false,ans:[],score:0};
  const bc=BANKED_CLOZES[sk][bi];
  let score=0;
  bc.blanks.forEach((bl,i)=>{if(st.ans[i]&&st.ans[i].wordIdx===bl.answer)score++});
  st.done=true;st.score=score;
  prog[stateKey]=st;save();
  // Re-render
  switch(sk){
    case 'grammar':renderGrammar();break
    case 'vocab':renderVocab();break
    case 'longsent':renderLongSent();break
    case 'cloze':renderCloze();break
    case 'trans':renderTrans();break
    case 'reading':renderReading();break
  }
}

function bcReset(sk,bi){
  const stateKey=`bc_${sk}_${bi}`;
  prog[stateKey]={done:false,ans:[],score:0};save();
  switch(sk){
    case 'grammar':renderGrammar();break
    case 'vocab':renderVocab();break
    case 'longsent':renderLongSent();break
    case 'cloze':renderCloze();break
    case 'trans':renderTrans();break
    case 'reading':renderReading();break
  }
}

// ===== EXPORT/IMPORT =====
function exportProg(){navigator.clipboard.writeText(JSON.stringify(prog)).then(()=>toast('✅ 已复制进度数据','good')).catch(()=>toast('复制失败','bad'))}
function importProg(){
  const inp=prompt('粘贴进度数据：');if(!inp)return;
  try{const d=JSON.parse(inp.trim());if(typeof d!=='object')throw new Error();
    for(const[k,v]of Object.entries(d)){const ex=prog[k];if(ex&&v&&typeof v.bestScore==='number'){ex.completed=ex.completed||v.completed;ex.bestScore=Math.max(ex.bestScore,v.bestScore||0)}else if(!ex)prog[k]=v}
    save();toast('🎉 进度导入成功','good');render()
  }catch{toast('数据格式错误','bad')}
}

// ===== INIT =====
renderGrammar();
</script>
